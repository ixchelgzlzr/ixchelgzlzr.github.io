# SITE SETTINGS
title: Priors & Bryos Lab                        # Title in top navigation bar (navbar) and <head>
author: Ixchel González-Ramírez                  # Used for copyright statement in footer
baseurl: "https://ixchelgzlzr.github.io"                  # Only required if your site is in a directory e.g. https://username.github.io/sitename
                                        # which has url: "https://username.github.io" (no slash) and baseurl: "/sitename" (leading slash)
                                        # A baseurl affects internal links, see http://peterdesmet.com/petridish/markdown/#links

# SOCIAL PROFILES
social:
  email: name@example.com
  bluesky: bluesky_username.bsky.social
  github: ixchelgzlzr               # Can also be a github_username/repository

# THEME SETTINGS (ALL OPTIONAL)
posts_on_home: 4                        # Show x number of latest posts on homepage, can be 0
archive_permalink: /blog/               # Permalink of page using the archive.html layout, required when using post tags
github_edit: false                       # Show an "edit this page" link in the footer, can also be name of branch (default: main)
colors:
  links: "#0F3438"                      # Color for links: use a readable color that contrasts well with dark text
  banner: "#0F3438"                     # Background color for page banners: use color that contrasts well with white
  footer: "#4A5F60"                   # Background color for footer: use color that contrasts well with white
font_serif: true                        # Font type for page content: serif (default) or slightly smaller sans-serif
rounded_corners: true                   # Enable (default) rounded corners on boxes and buttons
logo: assets/theme/images/logo.jpg      # Logo in navbar
logo_and_title: true                    # If logo is enabled, show title as well (default)



# BUILD SETTINGS
markdown: kramdown
plugins:                                # If you build your site on gh-pages, only use these plugins: https://pages.github.com/versions/
  - jekyll-feed
  - jekyll-sitemap
exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
  - node_modules
  - LICENSE
  - package-lock.json
  - package.json
  - jekyll-theme-petridish.gemspec
  - CITATION.cff

# FRONTMATTER DEFAULTS
defaults:
  - scope:
      path: ""
    values:
      layout: default                   # Use default.html layout by default for all files
  - scope:
      type: posts
    values:
      permalink: "/blog/:year/:slug/"   # Use /blog/yyyy/{filename}/ as permalink for all posts
